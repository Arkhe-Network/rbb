# Cathedral ARKHE v17.0 - Configuração Central

cathedral:
  version: "17.0"
  substrato: 3000
  selo: "CATHEDRAL-ARKHE-v17.0-2026-06-14"

  logging:
    level: INFO
    dir: "./logs"
    max_size_mb: 100
    backup_count: 10
    format: "%(asctime)s [%(name)s] [%(levelname)s]: %(message)s"

  # ============================================================
  # FAST BRAIN
  # ============================================================
  fast_brain:
    enabled: true
    action_dim: 4
    embed_dim: 256
    device: "cuda"
    target_cycle_ms: 5.0
    target_frequency_hz: 100

    vision:
      encoder: "yolov8n"
      device: "cuda"
      confidence_threshold: 0.5

    world_model:
      type: "rssm"
      deter_dim: 256
      stoch_dim: 32
      hidden_dim: 256

    safety:
      engine: "z3"
      max_force: 10.0
      forbidden_targets: ["humano", "animal", "objeto_fragil"]

    meta_learning:
      enabled: true
      adaptation_strength: 0.3
      prototype_dim: 256

    memory:
      backend: "hnsw"
      data_dir: "./zvec_data"
      collection_name: "cathedral_fastbrain_v17"
      state_dim: 288
      top_k: 5

  # ============================================================
  # SLOW BRAIN (SGLang via WSL2)
  # ============================================================
  slow_brain:
    enabled: true
    engine: "sglang"

    api_base: "http://localhost:8000/v1"
    api_key: "cathedral_key"
    model_name: "default"
    timeout: 30.0
    max_tokens: 500
    temperature: 0.1

    xgrammar:
      enabled: true
      schema_file: "./config/slow_brain_schema.json"

    rag:
      enabled: true
      memory_backend: "hnsw"
      top_k_memories: 5
      context_window_tokens: 2000

    swi_reasoning:
      enabled: true
      system_prompt: |
        Você é o Slow Brain do Cathedral AGI. Especialista em raciocínio lógico
        e segurança de sistemas autônomos.
        Use SwiReasoning: decomponha o problema em premissas, derive conclusões,
        e só então proponha a ação.
        Responda SEMPRE em JSON válido seguindo o schema fornecido.

    fallback:
      enabled: true
      stub_action: "zero"
      max_retries: 3
      retry_delay_ms: 1000
      windows_native:
        enabled: false
        endpoint: "http://localhost:8001/v1"
        model: "phi-4-mini"

  # ============================================================
  # ROUTER
  # ============================================================
  router:
    confidence_threshold: 0.3
    deadlock_window: 10
    deadlock_threshold: 0.1

    rules:
      - name: "Z3_UNSAT"
        condition: "not safety_approved"
        priority: 1
        action: "route_to_slow"

      - name: "LOW_CONFIDENCE"
        condition: "confidence < 0.3"
        priority: 2
        action: "route_to_slow"

      - name: "DEADLOCK"
        condition: "action_variance < 0.1 over 10 steps"
        priority: 2
        action: "route_to_slow"

      - name: "NO_MEMORY"
        condition: "zvec_memory_count == 0 and episode_step > 0"
        priority: 3
        action: "route_to_slow"

      - name: "FAST_SUFFICIENT"
        condition: "default"
        priority: 4
        action: "route_to_fast"

  # ============================================================
  # zVEC / MEMÓRIA EPISÓDICA
  # ============================================================
  zvec:
    enabled: true
    milvus:
      enabled: false
      host: "localhost"
      port: 19530
      collection_name: "cathedral_memories"
      index_type: "HNSW"
      metric_type: "L2"
      dim: 288

    fallback:
      enabled: true
      backend: "hnswlib"
      data_dir: "./zvec_data/hnsw_fallback"
      max_elements: 100000
      ef_construction: 200
      M: 16

  # ============================================================
  # TELEMETRY
  # ============================================================
  telemetry:
    enabled: true
    prometheus_port: 9090
    metrics:
      - fast_brain_cycle_ms
      - slow_brain_latency_ms
      - router_decisions
      - zvec_retrieval_time_ms
      - safety_violations

  # ============================================================
  # HARDWARE PROFILE
  # ============================================================
  hardware:
    gpu: "Auto"
    vram_gb: 24
    ram_gb: 64
    cpu_cores: 16

  # ============================================================
  # SECURITY
  # ============================================================
  security:
    pqc:
      enabled: false
      algorithm: "SPHINCS+"
      key_dir: "./keys"

    provenance:
      enabled: false
      gguf_required: false
      reject_unknown_origin: false

    firewall:
      enabled: true
      substrate: 2140
      max_connections_per_second: 1000
