name: Enforce Lean 4 Proofs

on:
  pull_request:
    branches: [ "main" ]

jobs:
  check-proofs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Run unproven code rejector
        run: |
          python cathedral-agi-omega/INFRASTRUCTURE/ci_cd/reject_unproven.py
